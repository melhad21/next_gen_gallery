name: Build Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'

      - name: Hard Reset Android Config
        run: |
          # 1. صاوب local.properties ناضي
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # 2. كتب settings.gradle من الزيرو بطريقة "Universal"
          cat << 'END_GRADLE' > android/settings.gradle
          include ':app'
          def localProperties = new Properties()
          def localPropertiesFile = new File(settingsDir, "local.properties")
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withInputStream { localProperties.load(it) }
          }
          def flutterSdkPath = localProperties.getProperty('flutter.sdk')
          if (flutterSdkPath == null) throw new GradleException("flutter.sdk not found")
          apply from: "\$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
          END_GRADLE

      - name: Clean and Get Deps
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gallery-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
